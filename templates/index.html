<!DOCTYPE html>
<html>
<head>
    <title>Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body id="body" class="bg-light">

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <span class="navbar-brand fw-bold">Sensor Dashboard</span>

    <div class="ms-auto">
        <button onclick="toggleTheme()" class="btn btn-outline-dark btn-sm">
            🌗 Theme
        </button>
    </div>
</nav>

<div class="container mt-4">

    <!-- ⏳ LOADING -->
    <div id="loading" class="text-center my-3">
        <div class="spinner-border text-primary"></div>
    </div>

    <!-- 📊 CHART -->
    <div class="card shadow-sm p-3 mb-4">
        <canvas id="chart"></canvas>
    </div>

    <!-- 📦 CARDS -->
    <div class="row text-center">

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow-sm">
                <h6 class="text-muted">Temperature</h6>
                <h2 id="temp">--</h2>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow-sm">
                <h6 class="text-muted">Pressure</h6>
                <h2 id="press">--</h2>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card p-3 shadow-sm">
                <h6 class="text-muted">Vibration</h6>
                <h2 id="vib">--</h2>
            </div>
        </div>

    </div>

    <!-- 🚨 ALERT -->
    <div class="text-center mt-3">
        <h5 id="alert" class="text-danger"></h5>
    </div>

    <!-- 📥 EXPORT -->
    <div class="text-center mt-4">
        <a href="/export" class="btn btn-primary">Download Data</a>
    </div>

</div>

<script>
let dark = false;

function toggleTheme(){
    let body = document.getElementById("body");

    if(!dark){
        body.classList.remove("bg-light");
        body.classList.add("bg-dark", "text-white");
    } else {
        body.classList.remove("bg-dark", "text-white");
        body.classList.add("bg-light");
    }

    dark = !dark;
}

let ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {label: 'Temperature', data: [], borderColor: '#0d6efd'},
            {label: 'Pressure', data: [], borderColor: '#198754'},
            {label: 'Vibration', data: [], borderColor: '#6c757d'}
        ]
    },
    options: {
        responsive: true,
        animation: false
    }
});

async function fetchData() {
    let res = await fetch('/data');
    let data = await res.json();

    document.getElementById("loading").style.display = "none";

    chart.data.labels.push(data.time);
    chart.data.datasets[0].data.push(data.sensors.temperature);
    chart.data.datasets[1].data.push(data.sensors.pressure);
    chart.data.datasets[2].data.push(data.sensors.vibration);

    if(chart.data.labels.length > 20){
        chart.data.labels.shift();
        chart.data.datasets.forEach(d => d.data.shift());
    }

    chart.update();

    document.getElementById("temp").innerText = data.sensors.temperature;
    document.getElementById("press").innerText = data.sensors.pressure;
    document.getElementById("vib").innerText = data.sensors.vibration;

    if(data.alert){
        document.getElementById("alert").innerText = "⚠ High Temperature Alert";
    } else {
        document.getElementById("alert").innerText = "";
    }
}

setInterval(fetchData, 2000);
</script>

</body>
</html>
