<!DOCTYPE html>
<html>
<head>
    <title>Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2 class="text-center mb-4">Industrial Sensor Dashboard</h2>

    <div class="card bg-secondary p-3">
        <canvas id="chart"></canvas>
    </div>

    <div class="mt-4 text-center">
        <h4 id="temp"></h4>
        <h4 id="press"></h4>
        <h4 id="vib"></h4>
        <h4 id="alert" class="text-danger"></h4>
    </div>

    <div class="text-center mt-4">
        <a href="/export" class="btn btn-success">Download Data</a>
    </div>

</div>

<script>
let ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {label: 'Temperature', data: []},
            {label: 'Pressure', data: []},
            {label: 'Vibration', data: []}
        ]
    }
});

async function fetchData() {
    let res = await fetch('/data');
    let data = await res.json();

    chart.data.labels.push(data.time);
    chart.data.datasets[0].data.push(data.sensors.temperature);
    chart.data.datasets[1].data.push(data.sensors.pressure);
    chart.data.datasets[2].data.push(data.sensors.vibration);

    if(chart.data.labels.length > 20){
        chart.data.labels.shift();
        chart.data.datasets.forEach(d => d.data.shift());
    }

    chart.update();

    document.getElementById("temp").innerText = "Temperature: " + data.sensors.temperature;
    document.getElementById("press").innerText = "Pressure: " + data.sensors.pressure;
    document.getElementById("vib").innerText = "Vibration: " + data.sensors.vibration;

    if(data.alert){
        document.getElementById("alert").innerText = "⚠ High Temperature!";
    } else {
        document.getElementById("alert").innerText = "";
    }
}

setInterval(fetchData, 2000);
</script>

</body>
</html>
